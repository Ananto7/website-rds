<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>RDS Coffee — Bottled Coffee for Every Moment</title>

    <!--
      ============================================================
      STRUKTUR FOLDER PROJECT:
      ============================================================
      rds-coffee/
      ├── index.html          ← file ini (entry point)
      ├── app.jsx             ← semua komponen React + data produk
      ├── style/
      │   └── main.css        ← semua styling & CSS variables
      └── images/
          ├── logo-bw.png     ← logo hitam putih (untuk navbar)
          ├── logo-purple.png ← logo ungu/lilac  (untuk about)
          ├── logo-pink.png   ← logo pink        (untuk footer)
          ├── foto-coast.jpg  ← foto produk COAST (untuk modal)
          ├── foto-warm.jpg   ← foto produk WARM  (untuk modal)
          ├── foto-classic.jpg← foto produk CLASSIC (untuk modal)
          └── foto-roast.jpg  ← foto produk ROAST  (untuk modal)

      ============================================================
      CARA MENAMBAH/MENGGANTI FOTO PRODUK:
      ============================================================
      1. Taruh foto di folder images/
      2. Buka app.jsx
      3. Cari array `const products = [...]`
      4. Di setiap objek produk, ubah nilai field `photo`:
         photo: "images/nama-foto-kamu.jpg"
      5. Simpan dan refresh browser

      ============================================================
      CARA DEPLOY KE NETLIFY:
      ============================================================
      1. Buka netlify.com/drop
      2. Drag & drop SELURUH FOLDER rds-coffee/
         (bukan hanya index.html — karena ada images/ dan style/)
      3. Langsung live!

      Atau via GitHub:
      1. Push folder ke GitHub repo
      2. Netlify → New site from Git → pilih repo
      3. Build command: (kosong)
      4. Publish directory: (kosong / root)
      ============================================================
    -->

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link
            href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Jost:wght@300;400;500&display=swap"
            rel="stylesheet"
    />

    <!-- Stylesheet utama -->
    <link rel="stylesheet" href="style/main.css"/>

    <!-- React + Babel (untuk development / static hosting tanpa build step) -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
<div id="root"></div>

<!--
  app.jsx diload sebagai text/babel agar Babel bisa transpile JSX di browser.
  Ini tidak memerlukan npm install atau build step apapun —
  cukup buka index.html dan semuanya berjalan.
-->
<script type="text/babel" src="app.jsx"></script>
</body>
</html>
