/* NAVBAR */
function Navbar(){
  const [sc,setSc]=useState(false);
  useEffect(()=>{
    const f=()=>setSc(window.scrollY>60);
    window.addEventListener("scroll",f);
    return()=>window.removeEventListener("scroll",f);
  },[]);
  return(
    <nav style={{position:"fixed",top:0,left:0,right:0,zIndex:100,
      padding:"1rem 3rem",display:"flex",alignItems:"center",justifyContent:"space-between",
      background:sc?"rgba(253,250,245,0.97)":"rgba(253,250,245,0.85)",
      backdropFilter:"blur(20px)",
      borderBottom:`1px solid ${sc?"rgba(201,169,110,0.25)":"rgba(201,169,110,0.12)"}`,
      transition:"all 0.4s ease"}}>
      <img src={`data:image/png;base64,${LOGO_BW}`} alt="RDS Logo" style={{height:"44px",width:"44px",objectFit:"contain",filter:"invert(1) sepia(1) saturate(1.5) hue-rotate(340deg) brightness(0.6)"}}/>
      <div style={{display:"flex",gap:"2.5rem",alignItems:"center"}}>
        {[["Produk","#produk"],["Service","#service"],["Event","#event"],["Tentang","#tentang"],["Kontak","#kontak"]].map(([l,h])=>(
          <a key={l} href={h} style={{fontFamily:"var(--ff-body)",fontSize:"0.75rem",letterSpacing:"0.18em",color:"var(--mid)",fontWeight:400,textTransform:"uppercase"}}>{l}</a>
        ))}
        <a href="#kontak" style={{border:"1px solid var(--gold)",color:"var(--gold-dk)",padding:"0.5rem 1.5rem",fontFamily:"var(--ff-body)",fontSize:"0.72rem",letterSpacing:"0.15em",fontWeight:400,textTransform:"uppercase"}}>Order</a>
      </div>
    </nav>
  );
}

/* PRODUCTS */
function Products(){
  const [selected,setSelected]=useState(null);
  return(
    <section id="produk" style={{background:"var(--ivory)",paddingTop:"7rem"}}>
      <div style={{maxWidth:"1280px",margin:"0 auto",padding:"0 3rem 3.5rem"}}>
        <p style={{fontFamily:"var(--ff-body)",fontSize:"0.7rem",letterSpacing:"0.35em",color:"var(--gold)",textTransform:"uppercase",marginBottom:"1rem"}}>Menu Kami</p>
        <h2 style={{fontFamily:"var(--ff-serif)",fontSize:"clamp(2.5rem,5vw,4.5rem)",fontWeight:300,color:"var(--charcoal)",lineHeight:1.05}}>
          Four Signature<br/><em style={{fontStyle:"italic",color:"var(--gold-dk)"}}>Flavours.</em>
        </h2>
      </div>

      {products.map((p,i)=>{
        const bottleLeft=i%2!==0;
        return(
          <div key={p.id} style={{background:i%2===0?"var(--white)":p.bg,borderTop:`1px solid ${p.color}80`,borderBottom:`1px solid ${p.color}80`}}>
            <div style={{maxWidth:"1280px",margin:"0 auto",display:"grid",gridTemplateColumns:"1fr 1fr",minHeight:"480px"}}>

              {/* BOTTLE SIDE */}
              <div style={{order:bottleLeft?1:2,background:p.bg,display:"flex",alignItems:"center",justifyContent:"center",padding:"4rem",position:"relative",overflow:"hidden",borderRight:bottleLeft?`1px solid ${p.color}80`:"none",borderLeft:!bottleLeft?`1px solid ${p.color}80`:"none"}}>
                <div style={{position:"absolute",width:"280px",height:"280px",borderRadius:"50%",background:`${p.color}25`}}/>
                <div style={{position:"relative",zIndex:1,width:"125px",height:"350px",background:p.color,borderRadius:"62px 62px 52px 52px",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",boxShadow:`0 30px 70px ${p.color}60`,gap:"8px"}}>
                  <div style={{position:"absolute",top:"-15px",width:"36px",height:"18px",background:"rgba(253,250,245,0.95)",borderRadius:"3px"}}/>
                  <span style={{fontFamily:"var(--ff-serif)",fontWeight:500,fontSize:"2.8rem",color:p.textOn,writingMode:"vertical-rl",transform:"rotate(180deg)",letterSpacing:"0.03em"}}>{p.name}</span>
                  <div style={{width:"32px",height:"1px",background:`${p.textOn}30`}}/>
                  <span style={{fontFamily:"var(--ff-body)",fontSize:"0.55rem",color:`${p.textOn}80`,letterSpacing:"0.14em",textTransform:"uppercase",writingMode:"vertical-rl",transform:"rotate(180deg)"}}>{p.subtitle}</span>
                </div>
                <p style={{position:"absolute",bottom:"2.5rem",fontFamily:"var(--ff-serif)",fontStyle:"italic",fontSize:"0.88rem",color:`${p.textOn}90`,textAlign:"center",padding:"0 2.5rem",lineHeight:1.6}}>"{p.tagline}"</p>
              </div>

              {/* INFO SIDE */}
              <div style={{order:bottleLeft?2:1,padding:"4rem 3.5rem",display:"flex",flexDirection:"column",justifyContent:"center"}}>
                <span style={{display:"inline-block",alignSelf:"flex-start",borderBottom:`1px solid ${p.color}`,color:"var(--gold-dk)",fontFamily:"var(--ff-body)",fontSize:"0.65rem",letterSpacing:"0.25em",textTransform:"uppercase",paddingBottom:"0.25rem",marginBottom:"1.25rem",fontWeight:400}}>
                  {`0${i+1} — Signature`}
                </span>
                <h3 style={{fontFamily:"var(--ff-serif)",fontSize:"clamp(2.5rem,4.5vw,4rem)",fontWeight:300,color:"var(--charcoal)",lineHeight:1}}>{p.name}</h3>
                <p style={{fontFamily:"var(--ff-serif)",fontStyle:"italic",fontSize:"1.05rem",fontWeight:300,color:"var(--gold-dk)",marginTop:"0.3rem",marginBottom:"1.25rem"}}>{p.subtitle}</p>
                <p style={{fontFamily:"var(--ff-body)",fontSize:"0.88rem",fontWeight:300,color:"var(--mid)",lineHeight:1.85,maxWidth:"400px",marginBottom:"1.5rem"}}>{p.description}</p>
                <p style={{fontFamily:"var(--ff-body)",fontSize:"0.72rem",letterSpacing:"0.08em",color:"var(--muted)",marginBottom:"1.75rem"}}>{p.details}</p>

                {/* pricing */}
                <div style={{display:"flex",flexDirection:"column",gap:"0.5rem",marginBottom:"2rem",maxWidth:"340px"}}>
                  {p.pricing.map(row=>(
                    <div key={row.qty} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"0.4rem 0",borderBottom:"1px solid rgba(201,169,110,0.12)"}}>
                      <span style={{fontFamily:"var(--ff-body)",fontSize:"0.85rem",fontWeight:400,color:"var(--mid)",letterSpacing:"0.05em"}}>{row.qty}</span>
                      <span style={{fontFamily:"var(--ff-serif)",fontSize:"1rem",fontWeight:400,color:"var(--charcoal)"}}>{row.price}</span>
                    </div>
                  ))}
                </div>

                <button onClick={()=>setSelected(p)} style={{alignSelf:"flex-start",background:"transparent",color:"var(--charcoal)",border:"1px solid var(--charcoal)",padding:"0.7rem 1.75rem",cursor:"pointer",fontFamily:"var(--ff-body)",fontSize:"0.72rem",letterSpacing:"0.18em",fontWeight:400,textTransform:"uppercase",transition:"all 0.3s"}}>
                  Pesan Varian Ini
                </button>
              </div>
            </div>
          </div>
        );
      })}

      {selected&&(
        <div onClick={()=>setSelected(null)} style={{position:"fixed",inset:0,background:"rgba(44,36,32,0.6)",zIndex:200,display:"flex",alignItems:"center",justifyContent:"center",padding:"2rem",backdropFilter:"blur(4px)"}}>
          <div onClick={e=>e.stopPropagation()} style={{background:"var(--white)",maxWidth:"560px",width:"100%",padding:"3rem",position:"relative",borderTop:`2px solid ${selected.color}`}}>
            <button onClick={()=>setSelected(null)} style={{position:"absolute",top:"1.25rem",right:"1.25rem",background:"none",border:"none",cursor:"pointer",fontFamily:"var(--ff-body)",fontSize:"0.72rem",color:"var(--muted)",letterSpacing:"0.1em"}}>✕ TUTUP</button>
            <p style={{fontFamily:"var(--ff-body)",fontSize:"0.65rem",letterSpacing:"0.25em",color:"var(--gold)",textTransform:"uppercase",marginBottom:"0.75rem"}}>Detail Produk</p>
            <h3 style={{fontFamily:"var(--ff-serif)",fontSize:"3rem",fontWeight:300,color:"var(--charcoal)",lineHeight:1}}>{selected.name}</h3>
            <p style={{fontFamily:"var(--ff-serif)",fontStyle:"italic",color:"var(--gold-dk)",marginTop:"0.2rem",marginBottom:"1.5rem"}}>{selected.subtitle}</p>
            <p style={{fontFamily:"var(--ff-body)",fontSize:"0.88rem",fontWeight:300,color:"var(--mid)",lineHeight:1.8,marginBottom:"1.5rem"}}>{selected.description}</p>
            <p style={{fontFamily:"var(--ff-body)",fontSize:"0.72rem",color:"var(--muted)",letterSpacing:"0.06em",marginBottom:"1.5rem"}}>{selected.details}</p>
            <div style={{borderTop:"1px solid rgba(201,169,110,0.2)",paddingTop:"1.25rem",display:"flex",flexDirection:"column",gap:"0.5rem",marginBottom:"2rem"}}>
              {selected.pricing.map(row=>(
                <div key={row.qty} style={{display:"flex",justifyContent:"space-between",padding:"0.35rem 0",borderBottom:"1px solid rgba(201,169,110,0.08)"}}>
                  <span style={{fontFamily:"var(--ff-body)",fontSize:"0.88rem",color:"var(--mid)"}}>{row.qty}</span>
                  <span style={{fontFamily:"var(--ff-serif)",fontSize:"0.95rem",color:"var(--charcoal)"}}>{row.price}</span>
                </div>
              ))}
            </div>
            <a href="#kontak" onClick={()=>setSelected(null)} style={{display:"block",textAlign:"center",background:"var(--charcoal)",color:"var(--ivory)",padding:"0.9rem 2rem",fontFamily:"var(--ff-body)",fontSize:"0.75rem",letterSpacing:"0.18em",fontWeight:400,textTransform:"uppercase"}}>Pesan Sekarang</a>
          </div>
        </div>
      )}
    </section>
  );
}

/* SERVICE */
function Service(){
  return(
    <section id="service" style={{background:"var(--blush)",padding:"8rem 3rem",borderTop:"1px solid rgba(201,169,110,0.15)"}}>
      <div style={{maxWidth:"1280px",margin:"0 auto"}}>
        <div style={{textAlign:"center",marginBottom:"5rem"}}>
          <p style={{fontFamily:"var(--ff-body)",fontSize:"0.7rem",letterSpacing:"0.35em",color:"var(--gold)",textTransform:"uppercase",marginBottom:"1rem"}}>Apa yang Kami Sediakan</p>
          <h2 style={{fontFamily:"var(--ff-serif)",fontSize:"clamp(2.5rem,5vw,4rem)",fontWeight:300,color:"var(--charcoal)",lineHeight:1.05}}>
            Service<br/><em style={{fontStyle:"italic",color:"var(--gold-dk)"}}>Bottle Concept.</em>
          </h2>
        </div>
        <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:"2rem"}}>
          {services.map((s,i)=>{

              <div key={s.label} style={{background:bgs[i],border:"1px solid rgba(201,169,110,0.15)",padding:"2.5rem 2rem",display:"flex",flexDirection:"column",gap:"1rem"}}>
                <span style={{fontFamily:"var(--ff-serif)",fontSize:"2rem",fontStyle:"italic",color:"var(--gold-lt)",lineHeight:1}}>{nums[i]}</span>
                <h4 style={{fontFamily:"var(--ff-body)",fontSize:"0.78rem",letterSpacing:"0.12em",color:"var(--charcoal)",textTransform:"uppercase",fontWeight:500,lineHeight:1.4}}>{s.label}</h4>
                <div style={{width:"24px",height:"1px",background:"var(--gold-lt)"}}/>

/* EVENTS */
function Events(){
  const items=[
    {label:"Wedding",color:"var(--pastel-pink)",bg:"var(--white)",desc:"Tambah kesan intimate dengan welcome drink berbranding personal yang membuat tamu undangan terkesan dan mengingat momenmu."},
    {label:"Birthday",color:"var(--pastel-blue)",bg:"var(--sky)",desc:"Hadirkan party favor yang berkesan dan bisa langsung dinikmati. Label botol bisa dikustomisasi sesuai tema ulang tahun."},
    {label:"Corporate",color:"var(--pastel-yellow)",bg:"var(--white)",desc:"Tingkatkan image brand dengan coffee hamper eksklusif untuk klien dan tim. Custom label tersedia sesuai identitas perusahaan."},
  ];
  return(
    <section id="event" style={{background:"var(--ivory)",padding:"8rem 3rem",borderTop:"1px solid rgba(201,169,110,0.12)"}}>
      <div style={{maxWidth:"1280px",margin:"0 auto"}}>
        <p style={{fontFamily:"var(--ff-body)",fontSize:"0.7rem",letterSpacing:"0.35em",color:"var(--gold)",textTransform:"uppercase",marginBottom:"1rem"}}>Tersedia Untuk</p>
        <h2 style={{fontFamily:"var(--ff-serif)",fontSize:"clamp(2.5rem,5vw,4rem)",fontWeight:300,color:"var(--charcoal)",lineHeight:1.05,marginBottom:"4rem"}}>
          Every Celebration,<br/><em style={{fontStyle:"italic",color:"var(--gold-dk)"}}>Every Moment.</em>
        </h2>
        <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:"2px",background:"rgba(201,169,110,0.1)"}}>
          {items.map(ev=>(
            <div key={ev.label} style={{background:ev.bg,padding:"3.5rem 3rem"}}>
              <div style={{width:"32px",height:"1px",background:"var(--gold)",marginBottom:"2rem"}}/>
              <h3 style={{fontFamily:"var(--ff-serif)",fontSize:"2.5rem",fontWeight:300,color:"var(--charcoal)",lineHeight:1,letterSpacing:"0.01em",marginBottom:"1.25rem"}}>{ev.label}.</h3>
              <p style={{fontFamily:"var(--ff-body)",fontSize:"0.88rem",fontWeight:300,color:"var(--mid)",lineHeight:1.85}}>{ev.desc}</p>
            </div>
          ))}
        </div>
      </div>
    </section>
  );
}

/* CONTACT */
function Contact(){
  const [form,setForm]=useState({name:"",email:"",event:"",message:""});
  const [status,setStatus]=useState("");
  const handleSubmit=async(e)=>{
    e.preventDefault();setStatus("sending");
    await new Promise(r=>setTimeout(r,1200));
    setStatus("sent");
  };
  return(
    <section id="kontak" style={{background:"var(--cream)",padding:"8rem 3rem",borderTop:"1px solid rgba(201,169,110,0.15)"}}>
      <div style={{maxWidth:"1280px",margin:"0 auto",display:"grid",gridTemplateColumns:"1fr 1fr",gap:"7rem",alignItems:"start"}}>
        <div>
          <p style={{fontFamily:"var(--ff-body)",fontSize:"0.7rem",letterSpacing:"0.35em",color:"var(--gold)",textTransform:"uppercase",marginBottom:"1rem"}}>Hubungi Kami</p>
          <h2 style={{fontFamily:"var(--ff-serif)",fontSize:"clamp(2.5rem,5vw,4rem)",fontWeight:300,color:"var(--charcoal)",lineHeight:1.05,marginBottom:"2rem"}}>
            Let's Brew<br/><em style={{fontStyle:"italic",color:"var(--gold-dk)"}}>Together.</em>
          </h2>
          <div style={{width:"40px",height:"1px",background:"var(--gold-lt)",marginBottom:"2rem"}}/>
          <p style={{fontFamily:"var(--ff-body)",fontSize:"0.88rem",fontWeight:300,color:"var(--mid)",lineHeight:1.85,marginBottom:"3rem"}}>
            Konsultasikan kebutuhanmu bersama kami. Kami akan bantu memilih varian terbaik dan tampilan botol yang sesuai tema eventmu.
          </p>
          {[["Lokasi","Depok, Jawa Barat, Indonesia"],["Email Owner","hello@rdscoffee.id"],["WhatsApp","+62 812-XXXX-XXXX"],["Free Transport","Area Depok"]].map(([k,v])=>(
            <div key={k} style={{marginBottom:"1.5rem",paddingBottom:"1.5rem",borderBottom:"1px solid rgba(201,169,110,0.12)"}}>
              <p style={{fontFamily:"var(--ff-body)",fontSize:"0.65rem",letterSpacing:"0.22em",color:"var(--gold)",textTransform:"uppercase",marginBottom:"0.3rem"}}>{k}</p>
              <p style={{fontFamily:"var(--ff-serif)",fontSize:"1rem",fontWeight:300,color:"var(--charcoal)"}}>{v}</p>
            </div>
          ))}
        </div>
        <div>
          {status==="sent"?(
            <div style={{textAlign:"center",padding:"5rem 2rem",border:"1px solid rgba(201,169,110,0.2)"}}>
              <p style={{fontFamily:"var(--ff-serif)",fontSize:"1rem",fontStyle:"italic",color:"var(--gold)",marginBottom:"1rem"}}>Pesan terkirim</p>
              <p style={{fontFamily:"var(--ff-serif)",fontSize:"3rem",fontWeight:300,color:"var(--charcoal)",lineHeight:1}}>Terima<br/>Kasih.</p>
              <p style={{fontFamily:"var(--ff-body)",fontSize:"0.83rem",fontWeight:300,color:"var(--mid)",marginTop:"1rem"}}>Kami akan menghubungimu dalam 1×24 jam.</p>
            </div>
          ):(
            <form onSubmit={handleSubmit} style={{display:"flex",flexDirection:"column",gap:"1.5rem"}}>
              {[{key:"name",label:"Nama Lengkap",type:"text",ph:"Nama kamu"},{key:"email",label:"Email",type:"email",ph:"email@example.com"}].map(f=>(
                <div key={f.key}>
                  <label style={{display:"block",fontFamily:"var(--ff-body)",fontSize:"0.65rem",letterSpacing:"0.2em",color:"var(--gold)",textTransform:"uppercase",marginBottom:"0.5rem"}}>{f.label}</label>
                  <input type={f.type} required placeholder={f.ph} value={form[f.key]} onChange={e=>setForm(p=>({...p,[f.key]:e.target.value}))} style={{width:"100%",padding:"0.85rem 1rem",background:"var(--white)",border:"1px solid rgba(201,169,110,0.25)",color:"var(--charcoal)",fontFamily:"var(--ff-body)",fontSize:"0.88rem",fontWeight:300}}/>
                </div>
              ))}
              <div>
                <label style={{display:"block",fontFamily:"var(--ff-body)",fontSize:"0.65rem",letterSpacing:"0.2em",color:"var(--gold)",textTransform:"uppercase",marginBottom:"0.5rem"}}>Jenis Event</label>
                <select value={form.event} onChange={e=>setForm(p=>({...p,event:e.target.value}))} style={{width:"100%",padding:"0.85rem 1rem",background:"var(--white)",border:"1px solid rgba(201,169,110,0.25)",color:form.event?"var(--charcoal)":"var(--muted)",fontFamily:"var(--ff-body)",fontSize:"0.88rem",fontWeight:300,appearance:"none"}}>
                  <option value="" style={{color:"#999"}}>Pilih jenis event</option>
                  {["Wedding","Birthday","Corporate","Other"].map(o=><option key={o} value={o}>{o}</option>)}
                </select>
              </div>
              <div>
                <label style={{display:"block",fontFamily:"var(--ff-body)",fontSize:"0.65rem",letterSpacing:"0.2em",color:"var(--gold)",textTransform:"uppercase",marginBottom:"0.5rem"}}>Pesan</label>
                <textarea rows={4} placeholder="Ceritakan kebutuhan eventmu, jumlah tamu, tanggal, dll..." value={form.message} onChange={e=>setForm(p=>({...p,message:e.target.value}))} style={{width:"100%",padding:"0.85rem 1rem",background:"var(--white)",border:"1px solid rgba(201,169,110,0.25)",color:"var(--charcoal)",fontFamily:"var(--ff-body)",fontSize:"0.88rem",fontWeight:300,resize:"vertical"}}/>
              </div>
              <button type="submit" disabled={status==="sending"} style={{background:"var(--charcoal)",color:"var(--ivory)",padding:"1rem 2.2rem",border:"none",cursor:"pointer",fontFamily:"var(--ff-body)",fontSize:"0.75rem",letterSpacing:"0.2em",fontWeight:400,textTransform:"uppercase",opacity:status==="sending"?0.7:1}}>
                {status==="sending"?"Mengirim...":"Kirim Pesan"}
              </button>
            </form>
          )}
        </div>
      </div>
    </section>
  );
}

          <p style={{fontFamily:"var(--ff-serif)",fontStyle:"italic",fontSize:"0.88rem",color:"var(--muted)"}}>Wedding · Birthday · Corporate</p>
          <p style={{fontFamily:"var(--ff-body)",fontSize:"0.68rem",letterSpacing:"0.1em",color:"var(--muted)"}}>© 2025 RDS Coffee. All rights reserved.</p>

      </div>
    </footer>

function App(){
  return(<><Navbar/><Hero/><About/><Products/><Service/><Events/><Contact/><Footer/></>);
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
